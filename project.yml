name: MoyMarshrut
options:
  bundleIdPrefix: com.myroute
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
targets:
  MoyMarshrut:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoyMarshrut
    info:
      path: MoyMarshrut/Info.plist
      properties:
        CFBundleDisplayName: "Мой маршрут"
        NSLocationWhenInUseUsageDescription: "Нужно для отслеживания маршрута прогулки"
        NSLocationAlwaysAndWhenInUseUsageDescription: "Нужно для отслеживания маршрута прогулки"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: com.myroute.MoyMarshrut
  MoyMarshrutTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoyMarshrutTests
    dependencies:
      - target: MoyMarshrut
    settings:
      SWIFT_VERSION: "5.9"
schemes:
  MoyMarshrut:
    build:
      targets:
        MoyMarshrut: all
        MoyMarshrutTests: [test]
    test:
      targets:
        - MoyMarshrutTests
